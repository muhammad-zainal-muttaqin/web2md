<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>web2md</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <div class="brand">
      <div class="logo"></div>
      <h1>web2md</h1>
    </div>
    <span class="version">v1.0.0</span>
  </header>

  <div class="source">
    <button class="seg active" data-mode="current">Current tab</button>
    <button class="seg" data-mode="paste">Paste HTML</button>
  </div>

  <div class="paste-area" hidden>
    <textarea id="html-input" placeholder="Paste HTML here (View Source, Save As..., etc.)..." spellcheck="false"></textarea>
    <div class="hint">⌘/Ctrl+V to paste</div>
  </div>

  <div class="actions">
    <button id="convert" class="primary">Convert</button>
  </div>

  <div class="result" id="result-section" hidden>
    <div class="result-tabs">
      <button class="rtab active" data-view="md">Markdown</button>
      <button class="rtab" data-view="raw">Raw</button>
      <button class="rtab" data-view="meta">Meta</button>
      <div class="result-actions">
        <button id="copy" class="icon-btn" title="Copy" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          <span>Copy</span>
        </button>
        <button id="download" class="icon-btn" title="Download .md" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span>.md</span>
        </button>
      </div>
    </div>
    <pre id="output" class="output"></pre>
  </div>

  <div class="status" id="status">
    <span class="dot"></span>
    <span class="text">Ready</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
